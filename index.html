<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamBase — Matrix Edition | @UrumaKap</title>
    <style>
        :root {
            --bg: #0a0f0a;
            --surface: #0d140d;
            --surface2: #111a11;
            --border: #1a3a1a;
            --border-bright: #2d5a2d;
            --text: #00ff41;
            --text2: #00cc33;
            --text-dim: #338833;
            --accent: #00ff41;
            --accent2: #00cc33;
            --red: #ff3333;
            --red-dim: #661111;
            --font: 'Courier New', 'Lucida Console', 'Consolas', monospace;
            --glow: 0 0 15px rgba(0, 255, 65, 0.4);
            --glow-strong: 0 0 25px rgba(0, 255, 65, 0.6);
            --radius: 0;
            --radius-sm: 0;
            --transition: 0.2s;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                linear-gradient(0deg, rgba(0,20,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,20,0,0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 0%, rgba(0,255,65,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 50% 100%, rgba(0,200,50,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1a3a1a; border:1px solid #2d5a2d; }
        ::-webkit-scrollbar-thumb:hover { background: #2d5a2d; }

        header {
            background: rgba(10,15,10,0.95);
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,255,65,0.15);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 38px; height: 38px;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--accent);
            box-shadow: var(--glow);
            animation: logoPulse 2s infinite;
        }
        @keyframes logoPulse {
            0%,100% { box-shadow: 0 0 12px rgba(0,255,65,0.4); }
            50% { box-shadow: 0 0 28px rgba(0,255,65,0.8); }
        }
        .logo-text {
            font-weight: 900;
            font-size: 18px;
            color: var(--accent);
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0,255,65,0.6);
        }
        .owner-badge {
            font-size: 9px;
            border: 1px solid var(--text-dim);
            padding: 3px 8px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .owner-badge span { color: #fff; font-weight: 900; }
        nav { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        nav a, nav button {
            font-size: 12px; font-weight: 700; padding: 8px 14px; cursor: pointer;
            border: 1px solid var(--border-bright); background: transparent;
            color: var(--text2); font-family: var(--font);
            transition: all var(--transition); white-space: nowrap;
            text-decoration: none; letter-spacing: 1px; text-transform: uppercase;
        }
        nav a:hover, nav button:hover {
            background: rgba(0,255,65,0.1); color: var(--accent);
            border-color: var(--accent); box-shadow: var(--glow);
        }
        nav a.active {
            background: rgba(0,255,65,0.15); color: var(--accent);
            border-color: var(--accent); box-shadow: var(--glow);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .widgets-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .widget {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 18px 16px;
            text-align: center;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .widget::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .widget:hover::before { opacity: 1; }
        .widget:hover {
            border-color: var(--border-bright);
            box-shadow: 0 0 20px rgba(0,255,65,0.1);
        }
        .widget .widget-icon { font-size: 28px; margin-bottom: 6px; }
        .widget .widget-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0,255,65,0.5);
        }
        .widget .widget-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            max-width: 600px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-bright);
            background: var(--surface2);
            color: var(--accent);
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            letter-spacing: 1px;
            transition: all var(--transition);
        }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: var(--glow);
        }
        .search-bar input::placeholder { color: #1a4a1a; }
        .search-bar button {
            padding: 12px 24px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-family: var(--font);
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all var(--transition);
        }
        .search-bar button:hover {
            background: var(--accent);
            color: #000;
            box-shadow: var(--glow-strong);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            transition: all var(--transition);
        }
        .card:hover {
            border-color: var(--border-bright);
            box-shadow: 0 0 16px rgba(0,255,65,0.08);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 8px;
        }
        .card-avatar {
            width: 40px; height: 40px;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 15px;
            color: var(--accent);
            flex-shrink: 0;
            text-shadow: 0 0 8px rgba(0,255,65,0.5);
        }
        .badge {
            padding: 3px 10px;
            border: 1px solid var(--red);
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--red);
        }
        .badge-green {
            border-color: var(--accent);
            color: var(--accent);
        }
        .card-title {
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .card-subtitle {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .card-details {
            font-size: 10px;
            color: var(--text2);
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
        }
        .card-details .row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .card-details .lbl {
            color: #2d5a2d;
            min-width: 55px;
            flex-shrink: 0;
        }
        .card-details .val {
            color: var(--text);
            word-break: break-all;
            font-size: 11px;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            color: #2d5a2d;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            letter-spacing: 1px;
        }
        .btn-xs {
            padding: 4px 10px;
            border: 1px solid var(--red);
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            background: transparent;
            color: var(--red);
            transition: all var(--transition);
        }
        .btn-xs:hover {
            background: var(--red);
            color: #000;
        }
        .btn-xs.green {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-xs.green:hover {
            background: var(--accent);
            color: #000;
        }

        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 18px;
            margin-bottom: 10px;
            transition: all var(--transition);
        }
        .post-card:hover {
            border-color: var(--border-bright);
        }
        .post-card h3 {
            font-size: 16px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .post-meta {
            font-size: 9px;
            color: #2d5a2d;
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
            letter-spacing: 1px;
        }
        .post-body {
            font-size: 12px;
            color: var(--text2);
            white-space: pre-wrap;
            line-height: 1.7;
        }
        .post-actions {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
        }

        .form-panel {
            background: var(--surface);
            border: 1px solid var(--border-bright);
            padding: 20px;
            max-width: 600px;
        }
        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-bright);
            background: var(--surface2);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            resize: vertical;
            transition: all var(--transition);
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            border-color: var(--accent);
            box-shadow: var(--glow);
        }
        .field textarea { min-height: 80px; }
        .field select option { background: var(--surface2); color: var(--text); }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-family: var(--font);
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all var(--transition);
            text-decoration: none;
            text-align: center;
        }
        .btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: var(--glow-strong);
        }
        .btn-block { display: block; width: 100%; }
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-red:hover { background: var(--red); color: #000; box-shadow: 0 0 20px rgba(255,51,51,0.5); }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 16px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal-dialog {
            background: var(--surface);
            border: 2px solid var(--accent);
            padding: 24px;
            max-width: 400px;
            width: 100%;
            position: relative;
            box-shadow: 0 0 40px rgba(0,255,65,0.2);
            animation: modalSlide 0.25s ease;
        }
        @keyframes modalSlide {
            from { opacity:0; transform: translateY(-16px); }
            to { opacity:1; transform: translateY(0); }
        }
        .modal-dialog h2 {
            font-size: 18px;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .modal-close {
            position: absolute;
            top: 8px;
            right: 14px;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            font-family: var(--font);
        }
        .modal-close:hover { color: #fff; }
        .modal-error {
            color: var(--red);
            font-size: 10px;
            margin-top: 4px;
            display: none;
            letter-spacing: 1px;
        }
        .modal-link {
            text-align: center;
            font-size: 10px;
            color: #2d5a2d;
            margin-top: 12px;
            letter-spacing: 1px;
        }
        .modal-link a {
            color: var(--accent);
            cursor: pointer;
            font-weight: 900;
            text-decoration: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 20px;
            font-weight: 900;
            font-size: 11px;
            z-index: 300;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
            letter-spacing: 2px;
            box-shadow: var(--glow);
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 10px;
            color: #2d5a2d;
            border-top: 2px solid var(--accent);
            letter-spacing: 2px;
            margin-top: 20px;
        }
        footer .sig {
            color: var(--accent);
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0,255,65,0.5);
        }

        /* Админ-панель */
        .admin-panel {
            background: var(--surface);
            border: 2px solid var(--accent);
            padding: 20px;
            margin-top: 16px;
            box-shadow: 0 0 30px rgba(0,255,65,0.1);
        }
        .admin-panel h3 {
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .mod-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface2);
            padding: 8px 12px;
            border: 1px solid var(--border);
            margin-bottom: 4px;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .inline-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .inline-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-bright);
            background: var(--surface2);
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            outline: none;
        }
        .inline-row button {
            padding: 8px 16px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-family: var(--font);
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
        }
        .inline-row button:hover {
            background: var(--accent);
            color: #000;
        }

        @media (max-width: 768px) {
            .header-inner { height: auto; padding: 8px 12px; flex-wrap: wrap; gap: 8px; }
            .logo-text { font-size: 15px; }
            nav a, nav button { font-size: 10px; padding: 6px 8px; }
            .widgets-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .cards-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .search-bar { flex-direction: column; }
            .search-bar button { width: 100%; text-align: center; }
        }
        @media (max-width: 480px) {
            .widgets-row { grid-template-columns: 1fr 1fr; }
            .widget { padding: 12px 10px; }
            .widget .widget-value { font-size: 22px; }
            .widget .widget-icon { font-size: 22px; }
            .toast { left: 10px; right: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a class="logo" onclick="switchTab('home')">
                <div class="logo-icon">⬡</div>
                <span class="logo-text">ScamBase</span>
                <span class="owner-badge">by <span>@UrumaKap</span></span>
            </a>
            <nav>
