<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamBase — Anonymous | @UrumaKap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(200, 0, 50, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(180, 0, 80, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(120, 0, 40, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.8) 0%, transparent 100%),
                linear-gradient(180deg, #0a0005 0%, #0a0a0a 40%, #0a0a0a 60%, #050005 100%);
            background-attachment: fixed;
            color: #ff3355;
            font-family: 'Courier New', 'Lucida Console', monospace;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Эффект шума / зернистости */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ЗВЁЗДЫ */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            box-shadow: 0 0 var(--glow) rgba(255, 255, 255, 0.7);
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.8);
            }
        }

        /* КОНТЕНТ */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* ЛОГОТИП */
        .logo {
            font-size: 90px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 30px rgba(255, 50, 80, 0.7)) drop-shadow(0 0 60px rgba(255, 0, 60, 0.4));
            animation: logoPulse 2.5s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                filter: drop-shadow(0 0 30px rgba(255, 50, 80, 0.7)) drop-shadow(0 0 60px rgba(255, 0, 60, 0.4));
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 50px rgba(255, 50, 80, 0.9)) drop-shadow(0 0 90px rgba(255, 0, 60, 0.6));
                transform: scale(1.05);
            }
        }

        /* ЗАГОЛОВОК */
        h1 {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: #ff1144;
            text-shadow: 0 0 30px rgba(255, 20, 60, 0.8), 0 0 60px rgba(255, 0, 50, 0.5), 0 0 90px rgba(200, 0, 60, 0.3);
            margin-bottom: 8px;
        }

        /* ПОДЗАГОЛОВОК */
        .subtitle {
            font-size: 13px;
            letter-spacing: 4px;
            color: #cc4466;
            margin-bottom: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 100, 130, 0.5);
        }
        .quote {
            font-size: 11px;
            letter-spacing: 3px;
            color: #993355;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-style: italic;
        }

        /* КНОПКИ */
        .btn {
            display: inline-block;
            padding: 13px 32px;
            border: 2px solid #ff2255;
            background: transparent;
            color: #ff3355;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            margin: 6px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 50, 80, 0.2), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover {
            background: #ff1144;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 20, 60, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.3);
            border-color: #ff0030;
        }
        .btn.fill {
            background: #cc0030;
            color: #fff;
            border-color: #ff1144;
        }
        .btn.fill:hover {
            background: #ff0030;
            box-shadow: 0 0 35px rgba(255, 0, 50, 0.8), inset 0 0 25px rgba(0, 0, 0, 0.4);
        }

        /* ФУТЕР */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 14px;
            font-size: 10px;
            color: #442233;
            letter-spacing: 2px;
            z-index: 1;
        }
        footer span {
            color: #ff3355;
            text-shadow: 0 0 8px rgba(255, 50, 80, 0.6);
        }

        /* АДАПТАЦИЯ */
        @media (max-width: 600px) {
            .logo {
                font-size: 60px;
            }
            h1 {
                font-size: 24px;
                letter-spacing: 4px;
            }
            .subtitle {
                font-size: 10px;
                letter-spacing: 2px;
            }
            .btn {
                padding: 10px 22px;
                font-size: 12px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <!-- ЗВЁЗДЫ -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- КОНТЕНТ -->
    <div class="content">
        <div class="logo">⚠️</div>
        <h1>ScamBase</h1>
        <p class="subtitle">We are Anonymous</p>
        <p class="quote">We are Legion. Expect us.</p>

        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
            <a href="#" class="btn">Войти</a>
            <a href="#" class="btn fill">Регистрация</a>
        </div>
    </div>

    <!-- ФУТЕР -->
    <footer>
        <span>⛧</span> @UrumaKap <span>⛧</span> | ScamBase © 2026
    </footer>

    <!-- ГЕНЕРАЦИЯ ЗВЁЗД -->
    <script>
        (function() {
            var container = document.getElementById('starsContainer');
            var count = 120; // Количество звёзд

            for (var i = 0; i < count; i++) {
                var star = document.createElement('div');
                star.className = 'star';

                // Случайные параметры
                var size = Math.random() * 2.5 + 0.8; // Размер: 0.8–3.3px
                var posX = Math.random() * 100;
                var posY = Math.random() * 100;
                var duration = Math.random() * 3 + 2; // 2–5 секунд
                var delay = Math.random() * 5;
                var glow = Math.random() * 4 + 1; // Свечение: 1–5px
                var opacity = Math.random() * 0.5 + 0.3; // 0.3–0.8

                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = posX + '%';
                star.style.top = posY + '%';
                star.style.setProperty('--duration', duration + 's');
                star.style.setProperty('--delay', delay + 's');
                star.style.setProperty('--glow', glow + 'px');
                star.style.opacity = opacity;

                container.appendChild(star);
            }
        })();
    </script>

</body>
  </html>
