<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamBase — Anonymous | @UrumaKap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            background-image:
                radial-gradient(ellipse at 50% 40%, rgba(180, 0, 0, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 60%, rgba(0, 0, 0, 0.9) 0%, transparent 60%),
                linear-gradient(180deg, #0a0000 0%, #0a0a0a 30%, #0a0a0a 70%, #0a0000 100%);
            background-attachment: fixed;
            color: #cc0000;
            font-family: 'Courier New', 'Lucida Console', monospace;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Лёгкий шум для атмосферы */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Контент поверх фона */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 0, 0, 0.9));
            }
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7), 0 0 40px rgba(255, 0, 0, 0.4);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            letter-spacing: 4px;
            color: #990000;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid #ff0000;
            background: transparent;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin: 6px;
        }

        .btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .btn.fill {
            background: #ff0000;
            color: #000;
        }

        .btn.fill:hover {
            background: #cc0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 14px;
            font-size: 10px;
            color: #330000;
            letter-spacing: 2px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="logo">⚠️</div>
        <h1>ScamBase</h1>
        <p class="subtitle">We are Anonymous. We are Legion. Expect us.</p>

        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
            <a href="#" class="btn">Войти</a>
            <a href="#" class="btn fill">Регистрация</a>
        </div>
    </div>

    <footer>
        ⛧ @UrumaKap ⛧ | ScamBase © 2026
    </footer>

</body>
</html>
