<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamBase — Anonymous | @UrumaKap</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --surface2: #0f0f0f;
            --border: #331111;
            --text: #ff3355;
            --text2: #cc4466;
            --accent: #ff1144;
            --font: 'Courier New', 'Lucida Console', monospace;
            --glow: 0 0 20px rgba(255, 20, 60, 0.5);
            --glow-text: 0 0 15px rgba(255, 50, 80, 0.7);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(200,0,50,0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(180,0,80,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(120,0,40,0.2) 0%, transparent 50%),
                linear-gradient(180deg, #0a0005 0%, #0a0a0a 40%, #0a0a0a 60%, #050005 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed; top:0; left:0; width:100%; height:100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index:0;
        }
        .stars-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star {
            position:absolute; background:#fff; border-radius:50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--del);
            box-shadow: 0 0 var(--gl) rgba(255,255,255,0.7);
        }
        @keyframes twinkle {
            0%,100% { opacity:0.3; transform:scale(1); }
            50% { opacity:1; transform:scale(1.8); }
        }
        .welcome-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            animation: fadeOut 1s ease 2.5s forwards;
        }
        @keyframes fadeOut { to { opacity:0; pointer-events:none; } }
        .welcome-logo { font-size:80px; margin-bottom:16px; animation:glitch 0.5s infinite; }
        @keyframes glitch {
            0%,100% { transform:translate(0); }
            20% { transform:translate(-4px,2px); }
            40% { transform:translate(4px,-2px); }
            60% { transform:translate(-3px,-2px); }
            80% { transform:translate(3px,2px); }
        }
        .welcome-text {
            font-size:36px; font-weight:900; color:#ff1144;
            text-shadow: 0 0 40px rgba(255,0,50,0.9), 0 0 80px rgba(200,0,60,0.6);
            letter-spacing:7px; margin-bottom:8px;
        }
        .welcome-sub { font-size:13px; color:#cc4466; letter-spacing:4px; opacity:0; animation:fadeIn 1s ease 0.8s forwards; }
        @keyframes fadeIn { to { opacity:1; } }

        header {
            background:rgba(5,0,0,0.95); border-bottom:2px solid var(--accent);
            position:sticky; top:0; z-index:100; box-shadow:0 0 25px rgba(255,0,50,0.3);
        }
        .header-inner {
            max-width:1100px; margin:0 auto; padding:0 14px; height:52px;
            display:flex; align-items:center; justify-content:space-between; gap:6px;
        }
        .logo {
            font-weight:900; font-size:16px; cursor:pointer; color:var(--accent);
            text-decoration:none; display:flex; align-items:center; gap:8px;
            text-shadow:var(--glow-text); letter-spacing:2px;
        }
        .logo-icon {
            width:32px; height:32px; border:2px solid var(--accent);
            display:flex; align-items:center; justify-content:center;
            font-size:16px; box-shadow:var(--glow); animation:pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow:0 0 12px rgba(255,0,50,0.5); }
            50% { box-shadow:0 0 28px rgba(255,0,60,0.9); }
        }
        .owner-tag { font-size:8px; border:1px solid var(--accent); padding:2px 6px; color:var(--text2); letter-spacing:1px; }
        .owner-tag span { color:#fff; font-weight:900; }
        nav { display:flex; gap:3px; flex-wrap:wrap; align-items:center; }
        nav a, nav button {
            font-size:10px; font-weight:700; padding:5px 9px; cursor:pointer;
            border:1px solid var(--accent); background:transparent; color:var(--accent);
            font-family:var(--font); transition:all 0.3s; white-space:nowrap;
            text-decoration:none; letter-spacing:1px; text-transform:uppercase;
        }
        nav a:hover, nav button:hover { background:var(--accent); color:#000; box-shadow:var(--glow); }
        nav a.active { background:var(--accent); color:#000; box-shadow:var(--glow); font-weight:900; }
        .user-badge { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; color:var(--accent); }
        .user-avatar {
            width:24px; height:24px; border:2px solid var(--accent);
            display:flex; align-items:center; justify-content:center;
            font-size:9px; font-weight:900;
        }

        .container { max-width:1100px; margin:0 auto; padding:12px 12px 40px; position:relative; z-index:1; }
        .tab { display:none; }
        .tab.active { display:block; }
        .hero { text-align:center; padding:16px 8px; }
        .hero h1 { font-size:20px; font-weight:900; letter-spacing:3px; text-shadow:var(--glow-text); margin-bottom:4px; text-transform:uppercase; }
        .hero p { color:var(--text2); font-size:10px; letter-spacing:2px; margin-bottom:12px; }

        .search-wrap { display:flex; gap:4px; max-width:460px; margin:0 auto 14px; }
        .search-wrap input {
            flex:1; padding:9px 12px; border:2px solid var(--accent); background:#000;
            color:var(--accent); font-size:11px; outline:none; font-family:var(--font);
            caret-color:var(--accent); letter-spacing:1px;
        }
        .search-wrap input:focus { box-shadow:var(--glow); }
        .search-wrap input::placeholder { color:#331111; }
        .search-wrap button {
            padding:9px 14px; border:2px solid var(--accent); background:#000;
            color:var(--accent); font-weight:900; cursor:pointer; font-family:var(--font);
            font-size:11px; letter-spacing:2px; transition:all 0.3s; text-transform:uppercase;
        }
        .search-wrap button:hover { background:var(--accent); color:#000; box-shadow:var(--glow); }

        .stats-row { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; }
        .stat-card {
            background:#000; border:1px solid var(--accent); padding:8px 12px;
            text-align:center; min-width:60px; flex:1; max-width:120px;
        }
        .stat-card .num { font-size:18px; font-weight:900; color:var(--accent); text-shadow:var(--glow-text); }
        .stat-card .lbl { font-size:7px; color:var(--text2); text-transform:uppercase; letter-spacing:2px; margin-top:2px; }

        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:8px; }
        .card {
            background:#000; border:1px solid var(--border); padding:12px;
            transition:border 0.3s, box-shadow 0.3s;
        }
        .card:hover { border-color:var(--accent); box-shadow:var(--glow); }
        .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
        .card-avatar {
            width:32px; height:32px; border:2px solid var(--accent);
            display:flex; align-items:center; justify-content:center;
            font-weight:900; color:var(--accent); font-size:12px; flex-shrink:0;
        }
        .badge { padding:2px 7px; border:1px solid var(--accent); font-size:7px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--accent); }
        .card-title { font-weight:900; font-size:12px; letter-spacing:1px; margin-bottom:2px; }
        .card-sub { font-size:8px; color:var(--text2); margin-bottom:5px; letter-spacing:1px; }
        .card-info { font-size:8px; color:var(--text2); margin-bottom:5px; letter-spacing:1px; }
        .card-info .row { display:flex; gap:3px; align-items:center; }
        .card-info .lbl { color:#661122; min-width:30px; }
        .card-info .val { color:var(--text); word-break:break-all; }
        .card-footer {
            font-size:7px; color:#661122; padding-top:5px; border-top:1px solid var(--border);
            display:flex; justify-content:space-between; letter-spacing:1px;
        }
        .btn-xs {
            padding:2px 7px; border:1px solid var(--accent); font-size:7px; font-weight:700;
            cursor:pointer; font-family:var(--font); background:transparent; color:var(--accent);
            letter-spacing:1px; transition:all 0.3s;
        }
        .btn-xs:hover { background:var(--accent); color:#000; }

        .post-card { background:#000; border:1px solid var(--border); padding:12px; margin-bottom:6px; transition:border 0.3s; }
        .post-card:hover { border-color:var(--accent); }
        .post-card h3 { font-size:13px; margin-bottom:2px; letter-spacing:1px; }
        .post-meta { font-size:7px; color:#661122; margin-bottom:5px; display:flex; gap:5px; letter-spacing:1px; }
        .post-body { font-size:10px; color:#cc4466; white-space:pre-wrap; letter-spacing:1px; line-height:1.5; }
        .post-actions { margin-top:5px; padding-top:5px; border-top:1px solid var(--border); display:flex; gap:4px; }

        .chat-box { background:#000; border:2px solid var(--accent); height:350px; display:flex; flex-direction:column; }
        .chat-messages { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:5px; }
        .chat-msg { max-width:80%; padding:7px 10px; font-size:9px; line-height:1.3; word-break:break-word; letter-spacing:1px; }
        .chat-msg.mine { align-self:flex-end; background:#1a0005; border:1px solid var(--accent); color:var(--accent); }
        .chat-msg.other { align-self:flex-start; background:#000; border:1px solid #331111; color:#cc4466; }
        .chat-msg .author { font-size:7px; font-weight:900; margin-bottom:1px; color:#fff; letter-spacing:1px; }
        .chat-input-row { display:flex; gap:4px; padding:6px; border-top:2px solid var(--accent); }
        .chat-input-row input {
            flex:1; padding:7px 10px; border:1px solid var(--accent); background:#000;
            color:var(--accent); font-size:10px; outline:none; font-family:var(--font); letter-spacing:1px;
        }
        .chat-input-row button {
            padding:7px 12px; border:1px solid var(--accent); background:#000;
            color:var(--accent); font-weight:900; cursor:pointer; font-family:var(--font);
            font-size:10px; transition:all 0.3s;
        }
        .chat-input-row button:hover { background:var(--accent); color:#000; }

        .form-card { background:#000; border:2px solid var(--accent); padding:14px; max-width:460px; }
        .field { margin-bottom:8px; }
        .field label { display:block; font-size:8px; font-weight:900; color:var(--accent); text-transform:uppercase; letter-spacing:2px; margin-bottom:2px; }
        .field input, .field textarea, .field select {
            width:100%; padding:7px 10px; border:1px solid var(--accent); background:#000;
            color:var(--accent); font-size:10px; font-family:var(--font); outline:none;
            resize:vertical; letter-spacing:1px;
        }
        .field textarea { min-height:50px; }
        .field select option { background:#000; color:var(--accent); }
        .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
        .btn-full {
            width:100%; padding:9px; border:2px solid var(--accent); font-weight:900;
            cursor:pointer; font-size:11px; font-family:var(--font); background:#000;
            color:var(--accent); letter-spacing:2px; text-transform:uppercase; transition:all 0.3s;
        }
        .btn-full:hover { background:var(--accent); color:#000; box-shadow:var(--glow); }
        .btn-red { border-color:#ff0030; color:#ff0030; }
        .btn-red:hover { background:#ff0030; color:#000; }

        .modal {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200;
            align-items:center; justify-content:center; padding:12px;
        }
        .modal.open { display:flex; }
        .modal-content {
            background:#000; border:2px solid var(--accent); padding:18px;
            max-width:360px; width:100%; position:relative; animation:modalIn 0.3s ease;
            box-shadow:0 0 40px rgba(255,0,50,0.4);
        }
        @keyframes modalIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        .modal-content h2 { font-size:15px; margin-bottom:12px; text-align:center; letter-spacing:2px; text-transform:uppercase; }
        .modal-close { position:absolute; top:5px; right:10px; background:none; border:none; color:var(--accent); font-size:16px; cursor:pointer; font-family:var(--font); }
        .modal-error { color:#ff0030; font-size:8px; margin-top:2px; display:none; letter-spacing:1px; }
        .modal-link { text-align:center; font-size:9px; color:#661122; margin-top:8px; letter-spacing:1px; }
        .modal-link a { color:var(--accent); cursor:pointer; font-weight:900; }

        .empty { text-align:center; padding:25px; color:#441122; letter-spacing:2px; }
        .empty .icon { font-size:30px; margin-bottom:5px; }

        .admin-box {
            background:#000; border:2px solid var(--accent); padding:14px; margin-bottom:12px;
            box-shadow:0 0 25px rgba(255,0,50,0.2);
        }
        .admin-box h3 { color:var(--accent); margin-bottom:6px; letter-spacing:2px; font-size:14px; }
        .mod-row {
            display:flex; justify-content:space-between; align-items:center;
            background:#050000; padding:5px 8px; border:1px solid var(--border);
            margin-bottom:2px; font-size:10px; letter-spacing:1px; gap:4px;
        }
        .inline-row { display:flex; gap:4px; margin-top:5px; }
        .inline-row input {
            flex:1; padding:5px 8px; border:1px solid var(--accent); background:#000;
            color:var(--accent); font-size:9px; outline:none; font-family:var(--font); letter-spacing:1px;
        }
        .inline-row button {
            padding:5px 10px; border:1px solid var(--accent); background:#000;
            color:var(--accent); font-weight:900; cursor:pointer; font-family:var(--font);
            font-size:9px; transition:all 0.3s;
        }
        .inline-row button:hover { background:var(--accent); color:#000; }

        .toast {
            position:fixed; bottom:14px; right:14px; background:#000; border:2px solid var(--accent);
            color:var(--accent); padding:9px 14px; font-weight:900; font-size:9px; z-index:300;
            opacity:0; transform:translateY(8px); transition:all 0.3s;
            pointer-events:none; letter-spacing:2px; box-shadow:var(--glow);
        }
        .toast.show { opacity:1; transform:translateY(0); }

        footer {
            text-align:center; padding:12px; font-size:8px; color:#441122;
            border-top:2px solid var(--accent); letter-spacing:2px;
        }
        footer .sig { color:var(--accent); font-weight:900; text-shadow:var(--glow-text); }

        @media (max-width:600px) {
            .header-inner { height:auto; padding:6px; flex-wrap:wrap; gap:3px; }
            .logo { font-size:13px; }
            .owner-tag { display:none; }
            nav a, nav button { font-size:8px; padding:4px 5px; }
            .grid { grid-template-columns:1fr; }
            .row-2 { grid-template-columns:1fr; }
            .chat-box { height:280px; }
            .welcome-text { font-size:18px; letter-spacing:2px; }
            .welcome-logo { font-size:45px; }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="starsContainer"></div>

    <div class="welcome-overlay">
        <div class="welcome-logo">⚠️</div>
        <div class="welcome-text">ScamBase</div>
        <div class="welcome-sub">We are Anonymous. We are Legion.</div>
        <div class="welcome-sub" style="margin-top:3px;font-size:9px;">Expect us.</div>
    </div>

    <header>
        <div class="header-inner">
            <a class="logo" onclick="switchTab('home')">
                <div class="logo-icon">⚠️</div>ScamBase
                <span class="owner-tag">by <span>@UrumaKap</span></span>
            </a>
            <nav>
                <a onclick="switchTab('home')" id="nav-home" class="active">База</a>
                <a onclick="switchTab('blog')" id="nav-blog">Блог</a>
                <a onclick="switchTab('chat')" id="nav-chat">Чат</a>
                <a onclick="switchTab('report')" id="nav-report">⚠</a>
                <span id="auth-btns">
                    <button onclick="openModal('loginModal')">Вход</button>
                    <button onclick="openModal('regModal')">Рег</button>
                </span>
                <span id="user-info" class="user-badge" style="display:none;">
                    <span class="user-avatar" id="user-avatar"></span>
                    <span id="user-name"></span>
                    <button onclick="logout()">X</button>
                </span>
            </nav>
        </div>
    </header>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
            <h2>Вход</h2>
            <div class="field"><label>Логин</label><input type="text" id="loginUser" placeholder="Логин"></div>
            <div class="field"><label>Пароль</label><input type="password" id="loginPass" placeholder="Пароль"></div>
            <p class="modal-error" id="loginErr">Неверный логин или пароль</p>
            <button class="btn-full" onclick="login()">Войти</button>
            <p class="modal-link">Нет аккаунта? <a onclick="closeModal('loginModal'); openModal('regModal')">Регистрация</a></p>
        </div>
    </div>

    <div class="modal" id="regModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('regModal')">✕</button>
            <h2>Регистрация</h2>
            <div class="field"><label>Логин</label><input type="text" id="regUser" placeholder="Логин"></div>
            <div class="field"><label>Пароль</label><input type="password" id="regPass" placeholder="Пароль"></div>
            <p class="modal-error" id="regErr">Пользователь уже существует</p>
            <button class="btn-full" onclick="register()">Регистрация</button>
            <p class="modal-link">Есть аккаунт? <a onclick="closeModal('regModal'); openModal('loginModal')">Войти</a></p>
        </div>
    </div>

    <div class="container">

        <div class="tab active" id="tab-home">
            <div class="hero">
                <h1>⛧ Проверь, с кем имеешь дело ⛧</h1>
                <p>Поиск по базе мошенников</p>
            </div>
            <div class="search-wrap">
                <input type="text" id="searchVal" placeholder="Телефон / Ник / Карта..." onkeydown="if(event.key==='Enter')searchScammers()">
                <button onclick="searchScammers()">Поиск</button>
                  </div>
